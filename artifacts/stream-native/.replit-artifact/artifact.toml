kind = "mobile"
previewPath = "/mobile/"
title = "Stream Link Extractor"
version = "1.0.0"
id = "artifacts/stream-native"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 19895

[services.development]
run = "pnpm --filter @workspace/stream-native run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/stream-native", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/stream-native", "run", "serve" ]

[services.env]
PORT = "19895"
BASE_PATH = "/mobile/"
